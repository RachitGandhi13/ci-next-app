name: Deploy to staging

on:
  push:
    branches:
      - "main"

jobs:
  redeploy_everything:
    name: Deploying everything to the staging cluster
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 168.144.157.227 >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key root@168.144.157.227 "cd ci-next-app && git fetch origin && git reset --hard origin/main && pnpm install && pnpm run build && pm2 restart http-server && pm2 restart web && pm2 restart ws-server"
