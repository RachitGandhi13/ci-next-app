name: Deploy to production

on:
  push:
    branches:
      - "production"

jobs:
  redeploy_everything:
    name: Deploying everything to the production cluster
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key root@${{ secrets.PROD_HOST }} "cd ci-next-app && git fetch origin && git reset --hard origin/production && pnpm install && pnpm run build && pm2 restart http-server && pm2 restart web && pm2 restart ws-server"
